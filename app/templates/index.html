<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Storyteller — Calm Échecs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-row">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Battlements -->
                        <rect x="52" y="18" width="20" height="32" rx="2" fill="none" stroke="currentColor" stroke-width="2" opacity="0.85"/>
                        <rect x="90" y="18" width="20" height="32" rx="2" fill="none" stroke="currentColor" stroke-width="2" opacity="0.85"/>
                        <rect x="128" y="18" width="20" height="32" rx="2" fill="none" stroke="currentColor" stroke-width="2" opacity="0.85"/>
                        <!-- Top platform -->
                        <path d="M48 50 L152 50" stroke="currentColor" stroke-width="2" opacity="0.8" fill="none"/>
                        <path d="M48 50 L48 42 L72 42 L72 50" stroke="currentColor" stroke-width="2" opacity="0.8" fill="none"/>
                        <path d="M86 50 L86 42 L114 42 L114 50" stroke="currentColor" stroke-width="2" opacity="0.8" fill="none"/>
                        <path d="M128 50 L128 42 L152 42 L152 50" stroke="currentColor" stroke-width="2" opacity="0.8" fill="none"/>
                        <!-- Upper collar -->
                        <rect x="55" y="50" width="90" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2" opacity="0.75"/>
                        <!-- Body taper -->
                        <path d="M62 64 Q64 110 66 145 Q64 155 60 170" fill="none" stroke="currentColor" stroke-width="2" opacity="0.8"/>
                        <path d="M138 64 Q136 110 134 145 Q136 155 140 170" fill="none" stroke="currentColor" stroke-width="2" opacity="0.8"/>
                        <!-- Mid band -->
                        <ellipse cx="100" cy="115" rx="32" ry="5" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"/>
                        <!-- Lower collar -->
                        <rect x="52" y="170" width="96" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2" opacity="0.75"/>
                        <!-- Base flare -->
                        <path d="M52 184 Q46 195 40 210" fill="none" stroke="currentColor" stroke-width="2" opacity="0.8"/>
                        <path d="M148 184 Q154 195 160 210" fill="none" stroke="currentColor" stroke-width="2" opacity="0.8"/>
                        <!-- Base platform -->
                        <ellipse cx="100" cy="212" rx="62" ry="10" fill="none" stroke="currentColor" stroke-width="2" opacity="0.8"/>
                        <!-- Base glow -->
                        <path d="M38 215 Q100 232 162 215 Q158 228 100 236 Q42 228 38 215Z" fill="currentColor" opacity="0.08"/>
                    </svg>
                    <div class="logo-text">
                        <span class="logo-title">Chess Storyteller</span>
                        <span class="logo-subtitle">calm échecs</span>
                    </div>
                </div>
                <a class="yt-link" href="https://youtube.com/@calmechecs" target="_blank" rel="noopener">
                    <svg class="yt-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.5 31.5 0 0 0 0 12a31.5 31.5 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.5 31.5 0 0 0 24 12a31.5 31.5 0 0 0-.5-5.8zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/>
                    </svg>
                    <span>@calmechecs</span>
                </a>
                <div class="header-nav">
                    <a href="/stories" class="nav-btn" id="navStoriesBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                        </svg>
                        Saved Stories
                    </a>
                    <button class="nav-btn" id="navNewBtn" style="display:none" onclick="requestNewStory()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        New Story
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Input Panel -->
            <section class="panel input-panel" id="inputPanel">
                <h2 class="panel-title">Your Game</h2>

                <div class="pgn-input-area">
                    <textarea
                        id="pgnInput"
                        class="pgn-textarea"
                        placeholder="Paste your PGN here..."
                        spellcheck="false"
                    ></textarea>

                    <div class="upload-divider">
                        <span>or</span>
                    </div>

                    <label class="upload-btn" for="pgnFile">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                        </svg>
                        Upload .pgn file
                    </label>
                    <input type="file" id="pgnFile" accept=".pgn" hidden>
                    <span class="file-name" id="fileName"></span>
                </div>

                <!-- Story Controls -->
                <div class="controls">
                    <div class="control-group">
                        <label class="control-label">I played as</label>
                        <div class="control-options" data-param="perspective">
                            <button class="control-option active" data-value="auto">Auto</button>
                            <button class="control-option" data-value="white">White</button>
                            <button class="control-option" data-value="black">Black</button>
                        </div>
                    </div>

                    <div class="control-group">
                        <label class="control-label">Verbosity</label>
                        <div class="control-options" data-param="verbosity">
                            <button class="control-option" data-value="minimal">Minimal</button>
                            <button class="control-option active" data-value="balanced">Balanced</button>
                            <button class="control-option" data-value="rich">Rich</button>
                        </div>
                    </div>

                    <div class="control-group">
                        <label class="control-label">Length</label>
                        <div class="control-options" data-param="length">
                            <button class="control-option" data-value="short">Short</button>
                            <button class="control-option active" data-value="medium">Medium</button>
                            <button class="control-option" data-value="long">Long</button>
                        </div>
                    </div>

                    <div class="control-group">
                        <label class="control-label">Mood</label>
                        <div class="control-options" data-param="mood">
                            <button class="control-option active" data-value="calm">Calm</button>
                            <button class="control-option" data-value="dramatic">Dramatic</button>
                            <button class="control-option" data-value="reflective">Reflective</button>
                        </div>
                    </div>
                </div>

                <button class="generate-btn" id="generateBtn" onclick="generateStory()">
                    <span class="btn-text">Tell the Story</span>
                    <span class="btn-loading">
                        <svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="15"/>
                        </svg>
                        Analysing & writing...
                    </span>
                </button>
            </section>

            <!-- Output Panel -->
            <section class="panel output-panel" id="outputPanel">
                <!-- Game Meta -->
                <div class="game-meta" id="gameMeta" style="display:none">
                    <span id="metaWhite"></span>
                    <span class="meta-vs">vs</span>
                    <span id="metaBlack"></span>
                    <span class="meta-result" id="metaResult"></span>
                </div>

                <!-- Story Display -->
                <div class="story-container" id="storyContainer">
                    <div class="story-placeholder">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                        </svg>
                        <p>Your story will appear here</p>
                    </div>
                    <div class="story-text" id="storyText"></div>
                </div>

                <!-- Action Bar -->
                <div class="action-bar" id="actionBar" style="display:none">
                    <button class="action-btn" onclick="toggleEdit()" id="editBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                        Edit
                    </button>
                    <button class="action-btn" onclick="copyStory()" id="copyBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="9" y="9" width="13" height="13" rx="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                        Copy
                    </button>
                    <button class="action-btn" onclick="saveStory()" id="saveBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17,21 17,13 7,13 7,21"/>
                            <polyline points="7,3 7,8 15,8"/>
                        </svg>
                        Save
                    </button>
                    <button class="action-btn" onclick="toggleTeleprompter()" id="teleprompterBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <polygon points="5,3 19,12 5,21"/>
                        </svg>
                        Teleprompter
                    </button>
                </div>

                <!-- Edit area (hidden by default) -->
                <textarea class="story-edit" id="storyEdit" style="display:none"></textarea>

                <!-- Provider info -->
                <div class="provider-info" id="providerInfo" style="display:none">
                    <span id="providerText"></span>
                </div>
            </section>
        </main>

        <!-- Error display -->
        <div class="error-toast" id="errorToast"></div>
    </div>

    <!-- Overwrite Confirmation Modal -->
    <div class="modal-overlay" id="overwriteModal" style="display:none">
        <div class="modal">
            <p class="modal-text">This story has been saved before. Overwrite the existing version?</p>
            <div class="modal-actions">
                <button class="action-btn" onclick="confirmSave(false)">Save as New</button>
                <button class="action-btn modal-confirm" onclick="confirmSave(true)">Overwrite</button>
                <button class="action-btn" onclick="cancelSave()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- New Story Confirmation Modal -->
    <div class="modal-overlay" id="newStoryModal" style="display:none">
        <div class="modal">
            <p class="modal-text">You have an unsaved story. What would you like to do?</p>
            <div class="modal-actions">
                <button class="action-btn modal-confirm" onclick="saveAndNew()">Save & Start New</button>
                <button class="action-btn" onclick="discardAndNew()">Discard</button>
                <button class="action-btn" onclick="cancelNew()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Teleprompter Overlay -->
    <div class="teleprompter-overlay" id="teleprompterOverlay">
        <div class="teleprompter-controls">
            <label class="tp-speed-label">Speed</label>
            <input type="range" id="tpSpeed" min="0.1" max="5" step="0.1" value="1.0" class="tp-speed">
            <button class="tp-close" onclick="toggleTeleprompter()">✕</button>
        </div>
        <div class="teleprompter-scroll" id="teleprompterScroll">
            <div class="teleprompter-text" id="teleprompterText"></div>
        </div>
        <div class="teleprompter-hint">Press Space to pause/resume · Esc to exit</div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
