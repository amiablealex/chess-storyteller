<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Storyteller — Calm Échecs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 32 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 38h16M6 35h20M9 35V14l-3-4V6h3V2h14v4h3v4l-3 4v21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 2v4M20 2v4M9 20h14" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
                </svg>
                <div class="logo-text">
                    <span class="logo-title">Chess Storyteller</span>
                    <span class="logo-subtitle">calm échecs</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Input Panel -->
            <section class="panel input-panel" id="inputPanel">
                <h2 class="panel-title">Your Game</h2>

                <div class="pgn-input-area">
                    <textarea
                        id="pgnInput"
                        class="pgn-textarea"
                        placeholder="Paste your PGN here..."
                        spellcheck="false"
                    ></textarea>

                    <div class="upload-divider">
                        <span>or</span>
                    </div>

                    <label class="upload-btn" for="pgnFile">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                        </svg>
                        Upload .pgn file
                    </label>
                    <input type="file" id="pgnFile" accept=".pgn" hidden>
                    <span class="file-name" id="fileName"></span>
                </div>

                <!-- Story Controls -->
                <div class="controls">
                    <div class="control-group">
                        <label class="control-label">Verbosity</label>
                        <div class="control-options" data-param="verbosity">
                            <button class="control-option" data-value="minimal">Minimal</button>
                            <button class="control-option active" data-value="balanced">Balanced</button>
                            <button class="control-option" data-value="rich">Rich</button>
                        </div>
                    </div>

                    <div class="control-group">
                        <label class="control-label">Length</label>
                        <div class="control-options" data-param="length">
                            <button class="control-option" data-value="short">Short</button>
                            <button class="control-option active" data-value="medium">Medium</button>
                            <button class="control-option" data-value="long">Long</button>
                        </div>
                    </div>

                    <div class="control-group">
                        <label class="control-label">Mood</label>
                        <div class="control-options" data-param="mood">
                            <button class="control-option active" data-value="calm">Calm</button>
                            <button class="control-option" data-value="dramatic">Dramatic</button>
                            <button class="control-option" data-value="reflective">Reflective</button>
                        </div>
                    </div>
                </div>

                <button class="generate-btn" id="generateBtn" onclick="generateStory()">
                    <span class="btn-text">Tell the Story</span>
                    <span class="btn-loading">
                        <svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="15"/>
                        </svg>
                        Analysing & writing...
                    </span>
                </button>
            </section>

            <!-- Output Panel -->
            <section class="panel output-panel" id="outputPanel">
                <!-- Game Meta -->
                <div class="game-meta" id="gameMeta" style="display:none">
                    <span id="metaWhite"></span>
                    <span class="meta-vs">vs</span>
                    <span id="metaBlack"></span>
                    <span class="meta-result" id="metaResult"></span>
                </div>

                <!-- Story Display -->
                <div class="story-container" id="storyContainer">
                    <div class="story-placeholder">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                        </svg>
                        <p>Your story will appear here</p>
                    </div>
                    <div class="story-text" id="storyText"></div>
                </div>

                <!-- Action Bar -->
                <div class="action-bar" id="actionBar" style="display:none">
                    <button class="action-btn" onclick="copyStory()" id="copyBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="9" y="9" width="13" height="13" rx="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                        Copy
                    </button>
                    <button class="action-btn" onclick="toggleTeleprompter()" id="teleprompterBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <polygon points="5,3 19,12 5,21"/>
                        </svg>
                        Teleprompter
                    </button>
                </div>

                <!-- Provider info -->
                <div class="provider-info" id="providerInfo" style="display:none">
                    <span id="providerText"></span>
                </div>
            </section>
        </main>

        <!-- Error display -->
        <div class="error-toast" id="errorToast"></div>
    </div>

    <!-- Teleprompter Overlay -->
    <div class="teleprompter-overlay" id="teleprompterOverlay">
        <div class="teleprompter-controls">
            <label class="tp-speed-label">Speed</label>
            <input type="range" id="tpSpeed" min="0.5" max="5" step="0.5" value="1.5" class="tp-speed">
            <button class="tp-close" onclick="toggleTeleprompter()">✕</button>
        </div>
        <div class="teleprompter-scroll" id="teleprompterScroll">
            <div class="teleprompter-text" id="teleprompterText"></div>
        </div>
        <div class="teleprompter-hint">Press Space to pause/resume · Esc to exit</div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
